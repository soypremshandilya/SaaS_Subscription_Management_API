# --- Server Configuration ---
server.port=8080

# --- Default Database (H2 In-Memory) ---
spring.datasource.url=jdbc:h2:mem:saasdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=saas
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Production Database (MySQL) ---
# To use MySQL, COMMENT OUT the H2 section above and UNCOMMENT the lines below.
# Make sure to create the database 'saas_db' in your MySQL server.
#spring.datasource.url=jdbc:mysql://localhost:3306/saas_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
#spring.datasource.username=root
#spring.datasource.password=root
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Logging Configuration ---
logging.level.org.springframework=INFO
logging.level.com.saas.subscription=DEBUG
